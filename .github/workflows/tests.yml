name: tests

# Run on every push (so direct work on a feature branch gets feedback) and
# on every PR (so reviewers see the status before merging). For PRs from
# the same repo this would otherwise run twice, so we skip the push event
# on PR-tracked branches.
on:
  push:
    branches-ignore:
      - 'gh-readonly-queue/**'
  pull_request:

concurrency:
  # Cancel in-progress runs for the same ref when a new commit lands.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest
        run: pytest -q --color=yes
